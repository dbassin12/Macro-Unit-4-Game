<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Macro Unit 4 — Level Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #131F24;
  --bg2: #1B2B33;
  --bg3: #233640;
  --card: #1E2D36;
  --card-hover: #253A45;
  --green: #58CC02;
  --green-dark: #46A302;
  --green-glow: rgba(88,204,2,0.3);
  --gold: #FFC800;
  --gold-dark: #E5B400;
  --gold-glow: rgba(255,200,0,0.3);
  --red: #FF4B4B;
  --red-dark: #E53E3E;
  --red-glow: rgba(255,75,75,0.25);
  --blue: #1CB0F6;
  --blue-dark: #0E9BD8;
  --purple: #CE82FF;
  --purple-dark: #B560F0;
  --orange: #FF9600;
  --text: #FFFFFF;
  --text2: #AFAFBF;
  --text3: #7A7A8E;
  --border: #37464F;
  --correct: #58CC02;
  --wrong: #FF4B4B;
  --font: 'Nunito', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 16px;
  --radius-sm: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100%; overflow-x: hidden; }

/* ===== TOP BAR ===== */
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--bg2); border-bottom: 2px solid var(--border); height: 56px; display: flex; align-items: center; padding: 0 20px; gap: 16px; }
.topbar-back { background: none; border: none; color: var(--text3); font-size: 1.3rem; cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.2s; display: none; }
.topbar-back:hover { color: var(--text); background: var(--bg3); }
.topbar-back.visible { display: block; }
.topbar-progress { flex: 1; height: 16px; background: var(--bg3); border-radius: 10px; overflow: hidden; display: none; }
.topbar-progress.visible { display: block; }
.topbar-progress-fill { height: 100%; background: var(--green); border-radius: 10px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
.topbar-stats { display: flex; gap: 20px; align-items: center; margin-left: auto; }
.stat { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 0.95rem; }
.stat-hearts { color: var(--red); }
.stat-xp { color: var(--gold); }
.stat-streak { color: var(--orange); }
.stat-icon { font-size: 1.1rem; }

/* ===== SCREENS ===== */
.screen { display: none; padding-top: 72px; min-height: 100vh; }
.screen.active { display: block; }

/* ===== HOME SCREEN ===== */
#homeScreen { text-align: center; padding: 72px 20px 40px; }
.home-header { margin-bottom: 32px; }
.home-header h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 4px; background: linear-gradient(135deg, var(--green), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.home-header p { color: var(--text2); font-size: 0.95rem; }
.home-level { display: inline-flex; align-items: center; gap: 8px; background: var(--bg3); padding: 8px 20px; border-radius: 20px; margin-top: 10px; font-weight: 700; font-size: 0.85rem; }
.home-level .lvl-num { color: var(--gold); font-size: 1.1rem; }
.xp-bar-wrap { max-width: 300px; margin: 12px auto 0; }
.xp-bar-bg { height: 12px; background: var(--bg3); border-radius: 8px; overflow: hidden; }
.xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--orange)); border-radius: 8px; transition: width 0.6s; }
.xp-bar-label { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }

/* Skill Path */
.skill-path { max-width: 500px; margin: 40px auto; position: relative; }
.skill-path svg.skill-connectors { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.skill-node { position: relative; z-index: 1; margin-bottom: 80px; display: flex; justify-content: center; }
.skill-node:nth-child(odd) { transform: translateX(-100px); }
.skill-node:nth-child(even) { transform: translateX(100px); }
.skill-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--border); background: var(--card); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; position: relative; }
.skill-btn:hover { transform: scale(1.08); border-color: var(--green); box-shadow: 0 0 20px var(--green-glow); }
.skill-btn .emoji { font-size: 1.6rem; }
.skill-btn .num { font-size: 0.7rem; font-weight: 800; color: var(--text3); }
.skill-btn.completed { border-color: var(--gold); background: linear-gradient(135deg, var(--bg3), var(--card)); }
.skill-btn.completed::after { content: '✓'; position: absolute; top: -4px; right: -4px; width: 22px; height: 22px; background: var(--gold); color: var(--bg); border-radius: 50%; font-size: 0.7rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
.skill-btn.current { border-color: var(--green); box-shadow: 0 0 20px var(--green-glow); animation: pulse 2s infinite; }
.skill-btn.locked { opacity: 0.4; cursor: not-allowed; }
.skill-btn.locked:hover { transform: none; border-color: var(--border); box-shadow: none; }
.skill-label { position: absolute; top: 84px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; font-weight: 700; color: var(--text2); width: 130px; text-align: center; white-space: normal; line-height: 1.3; }
.skill-btn.completed .skill-label { color: var(--gold); }

@keyframes pulse { 0%, 100% { box-shadow: 0 0 20px var(--green-glow); } 50% { box-shadow: 0 0 35px var(--green-glow), 0 0 60px rgba(88,204,2,0.15); } }

/* ===== LESSON SCREEN ===== */
#lessonScreen { display: flex; flex-direction: column; align-items: center; padding: 72px 20px 120px; }
.lesson-card { background: var(--card); border-radius: var(--radius); padding: 32px 28px; max-width: 600px; width: 100%; border: 2px solid var(--border); animation: slideUp 0.4s ease-out; overflow-wrap: break-word; word-wrap: break-word; }
@keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

/* Teach Card */
.teach-card { text-align: center; }
.teach-card .teach-emoji { font-size: 3rem; margin-bottom: 14px; }
.teach-card .teach-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 10px; }
.teach-card .teach-body { font-size: 0.95rem; color: var(--text2); line-height: 1.7; margin-bottom: 6px; overflow-wrap: break-word; }
.teach-card .teach-highlight { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px 18px; margin: 14px 0; font-family: var(--font-mono); font-size: 0.85rem; border-left: 4px solid var(--green); text-align: left; white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; line-height: 1.6; }
.teach-card .teach-highlight .hl { color: var(--gold); font-weight: 700; }
.teach-card .real-world { background: rgba(28,176,246,0.1); border: 1px solid rgba(28,176,246,0.2); border-radius: var(--radius-sm); padding: 12px 16px; margin-top: 14px; text-align: left; font-size: 0.88rem; color: var(--blue); }
.teach-card .real-world strong { color: var(--blue); }

/* Question Types */
.q-prompt { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; line-height: 1.5; text-align: center; }
.q-options { display: flex; flex-direction: column; gap: 10px; }
.q-option { padding: 14px 18px; background: var(--bg3); border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font); font-size: 0.95rem; font-weight: 600; transition: all 0.2s; text-align: left; color: var(--text); }
.q-option:hover:not(.locked) { border-color: var(--blue); background: var(--card-hover); transform: translateY(-1px); }
.q-option.selected { border-color: var(--blue); background: rgba(28,176,246,0.1); }
.q-option.correct { border-color: var(--green); background: rgba(88,204,2,0.15); color: var(--green); animation: correctPop 0.4s; }
.q-option.wrong { border-color: var(--red); background: rgba(255,75,75,0.1); color: var(--red); animation: shake 0.4s; }
.q-option.show-correct { border-color: var(--green); background: rgba(88,204,2,0.1); }
.q-option.locked { cursor: default; }
.q-option .opt-letter { display: inline-block; width: 28px; height: 28px; border-radius: 8px; background: var(--border); text-align: center; line-height: 28px; font-size: 0.8rem; font-weight: 800; margin-right: 10px; color: var(--text3); }
.q-option.correct .opt-letter { background: var(--green); color: white; }
.q-option.wrong .opt-letter { background: var(--red); color: white; }

@keyframes correctPop { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }

/* True/False */
.tf-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.tf-btn { padding: 20px; border-radius: var(--radius-sm); border: 3px solid var(--border); background: var(--bg3); text-align: center; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; }
.tf-btn:hover:not(.locked) { border-color: var(--blue); transform: translateY(-2px); }
.tf-btn.correct { border-color: var(--green); background: rgba(88,204,2,0.15); color: var(--green); }
.tf-btn.wrong { border-color: var(--red); background: rgba(255,75,75,0.1); color: var(--red); }
.tf-btn.show-correct { border-color: var(--green); background: rgba(88,204,2,0.1); }
.tf-btn.locked { cursor: default; }

/* Slider Question */
.slider-wrap { margin: 20px 0; text-align: center; }
.slider-wrap input[type="range"] { width: 100%; -webkit-appearance: none; height: 10px; border-radius: 5px; background: var(--bg3); outline: none; margin: 16px 0; }
.slider-wrap input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--blue); cursor: pointer; box-shadow: 0 2px 8px rgba(28,176,246,0.4); }
.slider-val { font-family: var(--font-mono); font-size: 2rem; font-weight: 700; color: var(--gold); }

/* Fill Blank */
.fill-blank-sentence { font-size: 1.05rem; line-height: 2; text-align: center; margin-bottom: 16px; }
.fill-blank { display: inline-block; min-width: 120px; border-bottom: 3px solid var(--blue); padding: 2px 8px; margin: 0 4px; color: var(--blue); font-weight: 700; }
.fill-choices { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.fill-choice { padding: 8px 18px; background: var(--bg3); border: 2px solid var(--border); border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; }
.fill-choice:hover:not(.locked) { border-color: var(--blue); }
.fill-choice.selected { border-color: var(--blue); background: rgba(28,176,246,0.15); }
.fill-choice.correct { border-color: var(--green); background: rgba(88,204,2,0.15); color: var(--green); }
.fill-choice.wrong { border-color: var(--red); background: rgba(255,75,75,0.1); color: var(--red); }
.fill-choice.locked { cursor: default; opacity: 0.6; }

/* Sort/Order */
.sort-area { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
.sort-drop { min-height: 48px; border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--text3); transition: all 0.2s; }
.sort-drop.filled { border-style: solid; border-color: var(--blue); background: rgba(28,176,246,0.1); color: var(--text); font-weight: 600; }
.sort-bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
.sort-chip { padding: 8px 16px; background: var(--bg3); border: 2px solid var(--border); border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.88rem; transition: all 0.2s; }
.sort-chip:hover { border-color: var(--blue); }
.sort-chip.used { opacity: 0.3; pointer-events: none; }

/* Feedback Bar */
.feedback-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 99; transform: translateY(100%); transition: transform 0.3s; }
.feedback-bar.visible { transform: translateY(0); }
.feedback-bar.correct { background: var(--green-dark); }
.feedback-bar.wrong { background: var(--red-dark); }
.feedback-bar.teach { background: var(--bg2); border-top: 2px solid var(--border); }
.feedback-msg { font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
.feedback-msg .xp-gain { color: var(--gold); font-family: var(--font-mono); }
.feedback-explain { font-size: 0.82rem; opacity: 0.85; max-width: 400px; }
.feedback-btn { padding: 12px 32px; border: none; border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.95rem; font-weight: 800; cursor: pointer; transition: all 0.2s; }
.feedback-btn:hover { transform: translateY(-1px); }
.feedback-btn.green { background: white; color: var(--green-dark); }
.feedback-btn.red { background: white; color: var(--red-dark); }
.feedback-btn.blue { background: var(--blue); color: white; }
.feedback-btn.next { background: var(--green); color: white; }

/* ===== RESULT SCREEN ===== */
#resultScreen { text-align: center; padding: 72px 20px 40px; }
.result-card { background: var(--card); border-radius: var(--radius); padding: 40px 32px; max-width: 500px; margin: 0 auto; border: 2px solid var(--border); }
.result-emoji { font-size: 4rem; margin-bottom: 16px; }
.result-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
.result-subtitle { color: var(--text2); margin-bottom: 24px; }
.result-stats { display: flex; justify-content: center; gap: 32px; margin: 24px 0; }
.result-stat { text-align: center; }
.result-stat .val { font-size: 1.8rem; font-weight: 900; }
.result-stat .label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.result-stat.xp .val { color: var(--gold); }
.result-stat.acc .val { color: var(--green); }
.result-stat.streak .val { color: var(--orange); }
.result-btn { display: inline-block; padding: 14px 40px; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); font-family: var(--font); font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; margin: 8px; }
.result-btn:hover { background: var(--green-dark); transform: translateY(-2px); }
.result-btn.secondary { background: var(--bg3); color: var(--text2); }
.result-btn.secondary:hover { background: var(--border); }
.result-perfect { color: var(--gold); font-weight: 800; font-size: 1.1rem; margin-bottom: 16px; }

/* ===== GAME OVER ===== */
.gameover-card { background: var(--card); border-radius: var(--radius); padding: 40px 32px; max-width: 400px; margin: 60px auto; border: 2px solid var(--red); text-align: center; }
.gameover-card h2 { color: var(--red); margin: 16px 0 8px; }

/* ===== CONFETTI ===== */
.confetti-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 200; overflow: hidden; }
.confetti { position: absolute; width: 10px; height: 10px; top: -10px; animation: confettiFall linear forwards; }
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ===== XP POPUP ===== */
.xp-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: var(--font-mono); font-size: 2rem; font-weight: 900; color: var(--gold); pointer-events: none; z-index: 201; animation: xpPop 1s forwards; text-shadow: 0 0 20px var(--gold-glow); }
@keyframes xpPop { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 30% { transform: translate(-50%, -50%) scale(1.3); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(1); } }

/* Home Footer */
.home-footer { max-width: 400px; margin: 60px auto 40px; text-align: center; }
.home-footer-stats { display: flex; align-items: center; justify-content: center; gap: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 28px; margin-bottom: 20px; }
.hf-stat { text-align: center; }
.hf-num { display: block; font-size: 1.3rem; font-weight: 900; color: var(--green); }
.hf-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.hf-divider { width: 1px; height: 36px; background: var(--border); }
.home-footer-credit { font-size: 0.8rem; color: var(--text3); margin-bottom: 8px; }
.home-footer-tip { font-size: 0.72rem; color: var(--text3); opacity: 0.6; background: var(--bg2); display: inline-block; padding: 5px 14px; border-radius: 12px; }

/* Responsive */
@media (max-width: 600px) {
  .lesson-card { padding: 24px 18px; }
  .q-prompt { font-size: 1rem; }
  .skill-btn { width: 66px; height: 66px; }
  .skill-btn .emoji { font-size: 1.3rem; }
  .skill-node:nth-child(odd) { transform: translateX(-60px); }
  .skill-node:nth-child(even) { transform: translateX(60px); }
  .result-stats { gap: 20px; }
  .feedback-bar { flex-direction: column; gap: 10px; text-align: center; }
  .skill-label { font-size: 0.65rem; width: 100px; }
  .skill-node { margin-bottom: 72px; }
  .home-footer-stats { gap: 12px; padding: 16px 18px; }
  .hf-num { font-size: 1.1rem; }
  .teach-card .teach-highlight { font-size: 0.78rem; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="topbar-back" id="backBtn" onclick="goHome()">✕</button>
  <div class="topbar-progress" id="lessonProgress"><div class="topbar-progress-fill" id="lessonProgressFill"></div></div>
  <div class="topbar-stats">
    <div class="stat stat-hearts"><span class="stat-icon">❤️</span><span id="heartsDisplay">5</span></div>
    <div class="stat stat-streak"><span class="stat-icon">🔥</span><span id="streakDisplay">0</span></div>
    <div class="stat stat-xp"><span class="stat-icon">⚡</span><span id="xpDisplay">0</span></div>
  </div>
</div>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <div class="home-header">
    <h1>The Financial Sector</h1>
    <p>AP Macroeconomics Unit 4</p>
    <div class="home-level">Level <span class="lvl-num" id="homeLvl">1</span> · <span id="homeLvlName">Freshman Saver</span></div>
    <div class="xp-bar-wrap">
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="homeXpBar" style="width:0%"></div></div>
      <div class="xp-bar-label"><span id="homeXpText">0</span> / <span id="homeXpNeeded">100</span> XP to next level</div>
    </div>
  </div>

  <div class="skill-path" id="skillPath"></div>

  <div class="home-footer">
    <div class="home-footer-stats">
      <div class="hf-stat"><span class="hf-num" id="hfLessons">0</span><span class="hf-label">Lessons Done</span></div>
      <div class="hf-divider"></div>
      <div class="hf-stat"><span class="hf-num" id="hfQuestions">70+</span><span class="hf-label">Questions</span></div>
      <div class="hf-divider"></div>
      <div class="hf-stat"><span class="hf-num" id="hfWeight">18-23%</span><span class="hf-label">of AP Exam</span></div>
    </div>
    <p class="home-footer-credit">Mr. Bassin's AP Macroeconomics · Unit 4: The Financial Sector · March 2026</p>
    <p class="home-footer-tip" id="footerTip">Press 1-4 for quick answer · Space/Enter to continue</p>
  </div>
</div>

<!-- LESSON SCREEN -->
<div class="screen" id="lessonScreen">
  <div class="lesson-card" id="lessonCard"></div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="resultScreen">
  <div class="result-card" id="resultCard"></div>
</div>

<!-- FEEDBACK BAR -->
<div class="feedback-bar" id="feedbackBar">
  <div>
    <div class="feedback-msg" id="feedbackMsg"></div>
    <div class="feedback-explain" id="feedbackExplain"></div>
  </div>
  <button class="feedback-btn" id="feedbackBtn" onclick="nextStep()">Continue</button>
</div>

<!-- CONFETTI -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
// ===================================================================
// GAME STATE
// ===================================================================
const state = {
  xp: 0,
  hearts: 5,
  streak: 0,
  bestStreak: 0,
  currentLesson: -1,
  currentStep: 0,
  lessonCorrect: 0,
  lessonTotal: 0,
  completed: [],
  screen: 'home'
};

const levels = [
  { name: 'Freshman Saver', xp: 0 },
  { name: 'Bond Buyer', xp: 100 },
  { name: 'Rate Watcher', xp: 250 },
  { name: 'Money Counter', xp: 450 },
  { name: 'Bank Teller', xp: 700 },
  { name: 'Market Trader', xp: 1000 },
  { name: 'Fed Intern', xp: 1400 },
  { name: 'Policy Analyst', xp: 1900 },
  { name: 'Macro Master', xp: 2500 },
  { name: 'AP Legend', xp: 3200 },
];

function getLevel() {
  let lvl = 0;
  for (let i = levels.length - 1; i >= 0; i--) {
    if (state.xp >= levels[i].xp) { lvl = i; break; }
  }
  return lvl;
}

// ===================================================================
// LESSON DATA — Each lesson is a sequence of teach/question steps
// ===================================================================
const lessons = [
// -------------------------------------------------------
// LESSON 0: 4.1 Financial Assets
// -------------------------------------------------------
{
  id: '4.1', title: 'Financial Assets', emoji: '📈', color: 'var(--green)',
  steps: [
    { type: 'teach', emoji: '💰', title: 'What Are Financial Assets?',
      body: "A <b>financial asset</b> is anything that stores value or gives you a claim on future income. When you buy a stock, you own a piece of a company. When you buy a bond, you've made a loan and you're owed interest payments.",
      highlight: "Two main types:\n• <span class='hl'>Stocks</span> = ownership (equity). Variable returns.\n• <span class='hl'>Bonds</span> = loans (debt). Fixed returns.",

{

      highlight: "Nominal rate = the <span class='hl'>advertised</span> rate\nIt does NOT account for inflation",

      body: "The <b>real interest rate</b> tells you what your money actually earns after inflation takes its cut. This is the number that matters for your purchasing power.",
      highlight: "The Fisher Equation:\n<span class='hl'>Real Rate = Nominal Rate − Expected Inflation</span>\n<span class='hl'>r = i − π</span>",
      realWorld: "In 2022, savings accounts paid ~0.5% but inflation was 9%. Real rate = 0.5% − 9% = −8.5%. People's savings were losing purchasing power FAST."

    { type: 'mc', prompt: 'If inflation is HIGHER than the nominal interest rate, the real interest rate is:',

    { type: 'tf', prompt: 'The Fisher Equation is: Real Rate = Nominal Rate + Inflation.', correct: false,

{
  id: '4.4', title: 'Banking & Money', emoji: '🏦', color: 'var(--orange)',
  steps: [
    { type: 'teach', emoji: '🏦', title: 'Banks Create Money (Seriously)',
      body: "Here's the wildest thing in economics: <b>banks create money out of thin air</b>. Not by printing it — by lending. When a bank lends $900 of your $1,000 deposit, that $900 gets deposited in another bank, which lends $810, and so on. One deposit creates a chain reaction of new money.",
      highlight: "This is called <span class='hl'>fractional reserve banking</span>\n\nBanks keep a fraction as reserves, lend the rest.\nEach loan creates a new deposit → more lending → more money",
      realWorld: "You deposit $1,000 at Chase. Chase lends $900 to someone who deposits it at Bank of America. BoA lends $810... Your single deposit can eventually create $10,000 in total money supply!"
    },
    { type: 'mc', prompt: 'In fractional reserve banking, banks:',
      options: ['Keep all deposits in a vault', 'Lend out a fraction of deposits', 'Print their own money', 'Keep a fraction as reserves and lend the rest'], correct: 3,
      explain: "Banks keep a fraction (the required reserve ratio) as reserves and lend out the rest. This lending process is how money gets created in the banking system." },
    { type: 'teach', emoji: '✖️', title: 'The Money Multiplier',
      body: "The <b>money multiplier</b> tells you the maximum amount of money the banking system can create from a new deposit. The formula is beautifully simple.",
      highlight: "Money Multiplier = <span class='hl'>1 / Reserve Ratio</span>\n\nIf RR = 10%: Multiplier = 1/0.10 = <span class='hl'>10</span>\nIf RR = 20%: Multiplier = 1/0.20 = <span class='hl'>5</span>",
      realWorld: "Since March 2020, the Fed's required reserve ratio is 0%. That means the theoretical multiplier is... infinity? In practice, banks still hold voluntary reserves."
    },
    { type: 'slider', prompt: 'If the reserve ratio is 10%, what is the money multiplier?',
      min: 1, max: 20, step: 1, correct: 10, tolerance: 0, unit: 'x',
      explain: "Money Multiplier = 1 / Reserve Ratio = 1 / 0.10 = 10. A $1,000 deposit can create up to $10,000 in the banking system." },
    { type: 'mc', prompt: 'A bank receives a $5,000 deposit. The reserve ratio is 20%. How much can this bank lend?',
      options: ['$1,000', '$4,000', '$5,000', '$25,000'], correct: 1,
      explain: "Required reserves = 20% × $5,000 = $1,000. Excess reserves (lendable) = $5,000 − $1,000 = $4,000. Individual banks lend their EXCESS reserves." },
    { type: 'teach', emoji: '📊', title: 'Individual Bank vs. Banking System',
      body: "Here's where students trip up: an <b>individual bank</b> can only lend its excess reserves. But the entire <b>banking system</b> creates money equal to the initial deposit × the multiplier.",
      highlight: "Individual bank lends: <span class='hl'>Deposit − Required Reserves</span>\nBanking system creates: <span class='hl'>Deposit × (1/RR)</span>\n\n$1,000 deposit, 10% RR:\n• One bank lends: $900\n• System creates: $10,000 total",
      realWorld: "This is why bank runs are so dangerous — if everyone withdraws at once, banks don't have enough cash because most of it has been lent out."
    },
    { type: 'mc', prompt: 'A $2,000 deposit with a 25% reserve ratio. What is the MAXIMUM total money supply increase for the entire banking system?',
      options: ['$1,500', '$2,000', '$6,000', '$8,000'], correct: 3,
      explain: "Multiplier = 1/0.25 = 4. Total money creation = $2,000 × 4 = $8,000. Remember: use the multiplier for the SYSTEM, not the individual bank." },
    { type: 'fill', prompt: 'An individual bank can lend its ______ reserves, while the banking system multiplies the initial deposit.',
      blank: 'excess', choices: ['required', 'excess', 'total', 'fractional'], correct: 1,
      explain: "Excess reserves = total deposits minus required reserves. This is what the bank CAN lend. Required reserves must stay in the vault." },
    { type: 'tf', prompt: 'If the reserve ratio decreases, the money multiplier increases.', correct: true,
      explain: "Yes! Money multiplier = 1/RR. Smaller denominator = bigger multiplier. If RR drops from 20% to 10%, the multiplier doubles from 5 to 10." },
    { type: 'mc', prompt: 'Why does the Fed set a required reserve ratio of 0% (as of 2020)?',
      options: ['Banks no longer need to hold any money', 'To maximize the money supply expansion', 'Banks now use other tools to manage risk', 'The multiplier formula no longer applies'], correct: 2,
      explain: "With 0% RR, the Fed shifted to using interest on reserves and other tools to manage the money supply. Banks still hold voluntary reserves — they just aren\'t legally required to." },
  ]
},

      highlight: "Limitations:\n• <span class='hl'>Time lags</span> — effects aren't immediate\n• <span class='hl'>Liquidity trap</span> — can't push rates below zero\n• <span class='hl'>Banks may hoard</span> — more reserves ≠ more lending\n• <span class='hl'>Global factors</span> — can't control foreign economies",

},

// ===================================================================
// UI RENDERING
// ===================================================================
function updateStats() {
  document.getElementById('heartsDisplay').textContent = state.hearts;
  document.getElementById('streakDisplay').textContent = state.streak;
  document.getElementById('xpDisplay').textContent = state.xp;
}

function updateHomeScreen() {
  const lvl = getLevel();
  const nextLvl = lvl < levels.length - 1 ? levels[lvl + 1].xp : levels[lvl].xp;
  const currLvlXp = levels[lvl].xp;
  const progress = ((state.xp - currLvlXp) / (nextLvl - currLvlXp)) * 100;

  document.getElementById('homeLvl').textContent = lvl + 1;
  document.getElementById('homeLvlName').textContent = levels[lvl].name;
  document.getElementById('homeXpBar').style.width = Math.min(progress, 100) + '%';
  document.getElementById('homeXpText').textContent = state.xp;
  document.getElementById('homeXpNeeded').textContent = nextLvl;

  // Footer stats
  const hfLessons = document.getElementById('hfLessons');
  if (hfLessons) hfLessons.textContent = state.completed.length + '/7';

  // Skill path
  const path = document.getElementById('skillPath');
  path.innerHTML = '';
  lessons.forEach((lesson, i) => {
    const isCompleted = state.completed.includes(i);
    const isCurrent = !isCompleted && (i === 0 || state.completed.includes(i - 1));
    const isLocked = !isCompleted && !isCurrent;
    const node = document.createElement('div');
    node.className = 'skill-node';
    node.innerHTML = `
      <button class="skill-btn ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''} ${isLocked ? 'locked' : ''}"
              onclick="${isLocked ? '' : 'startLesson(' + i + ')'}" style="${isCompleted ? 'border-color:' + lesson.color : isCurrent ? 'border-color:' + lesson.color : ''}">
        <span class="emoji">${lesson.emoji}</span>
        <span class="num">${lesson.id}</span>
        <span class="skill-label">${lesson.title}</span>
      </button>`;
    path.appendChild(node);
  });
  // Draw SVG connectors between nodes
  requestAnimationFrame(() => {
    const nodes = path.querySelectorAll('.skill-node');
    if (nodes.length < 2) return;
    const pathRect = path.getBoundingClientRect();
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'skill-connectors');
    svg.setAttribute('width', path.offsetWidth);
    svg.setAttribute('height', path.offsetHeight);
    for (let i = 0; i < nodes.length - 1; i++) {
      const btn1 = nodes[i].querySelector('.skill-btn');
      const btn2 = nodes[i+1].querySelector('.skill-btn');
      const r1 = btn1.getBoundingClientRect();
      const r2 = btn2.getBoundingClientRect();
      const x1 = r1.left + r1.width/2 - pathRect.left;
      const y1 = r1.top + r1.height/2 - pathRect.top;
      const x2 = r2.left + r2.width/2 - pathRect.left;
      const y2 = r2.top + r2.height/2 - pathRect.top;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', getComputedStyle(document.documentElement).getPropertyValue('--bg3').trim());
      line.setAttribute('stroke-width', '4');
      line.setAttribute('stroke-linecap', 'round');
      svg.appendChild(line);
    }
    const old = path.querySelector('svg.skill-connectors');
    if (old) old.remove();
    path.insertBefore(svg, path.firstChild);
  });
}

function showScreen(name) {
  state.screen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + 'Screen').classList.add('active');

  const backBtn = document.getElementById('backBtn');
  const progress = document.getElementById('lessonProgress');
  if (name === 'home') {
    backBtn.classList.remove('visible');
    progress.classList.remove('visible');
    updateHomeScreen();
  } else if (name === 'lesson') {
    backBtn.classList.add('visible');
    progress.classList.add('visible');
  } else {
    backBtn.classList.remove('visible');
    progress.classList.remove('visible');
  }
}

function goHome() {
  hideFeedback();
  showScreen('home');
}

// ===================================================================
// LESSON ENGINE
// ===================================================================
function startLesson(idx) {
  state.currentLesson = idx;
  state.currentStep = 0;
  state.lessonCorrect = 0;
  state.lessonTotal = 0;
  state.hearts = 5;
  updateStats();
  showScreen('lesson');
  renderStep();
}

function renderStep() {
  const lesson = lessons[state.currentLesson];
  const step = lesson.steps[state.currentStep];
  const card = document.getElementById('lessonCard');
  const progress = (state.currentStep / lesson.steps.length) * 100;
  document.getElementById('lessonProgressFill').style.width = progress + '%';
  hideFeedback();

  if (step.type === 'teach') {
    card.innerHTML = `
      <div class="teach-card">
        <div class="teach-emoji">${step.emoji}</div>
        <div class="teach-title">${step.title}</div>
        <div class="teach-body">${step.body}</div>
        ${step.highlight ? `<div class="teach-highlight">${step.highlight}</div>` : ''}
        ${step.realWorld ? `<div class="real-world"><strong>Real World:</strong> ${step.realWorld}</div>` : ''}
      </div>`;
    showFeedback('teach', '', '', 'Continue');
  }
  else if (step.type === 'mc') {
    const letters = ['A', 'B', 'C', 'D'];
    card.innerHTML = `
      <div class="q-prompt">${step.prompt}</div>
      <div class="q-options">
        ${step.options.map((opt, i) => `<button class="q-option" onclick="answerMC(${i})" id="opt${i}"><span class="opt-letter">${letters[i]}</span>${opt}</button>`).join('')}
      </div>`;
  }
  else if (step.type === 'tf') {
    card.innerHTML = `
      <div class="q-prompt">${step.prompt}</div>
      <div class="tf-options">
        <button class="tf-btn" onclick="answerTF(true)" id="tfTrue">TRUE</button>
        <button class="tf-btn" onclick="answerTF(false)" id="tfFalse">FALSE</button>
      </div>`;
  }
  else if (step.type === 'fill') {
    card.innerHTML = `
      <div class="q-prompt">${step.prompt.replace('______', `<span class="fill-blank" id="fillBlank">?</span>`)}</div>
      <div class="fill-choices">
        ${step.choices.map((c, i) => `<button class="fill-choice" onclick="answerFill(${i})" id="fc${i}">${c}</button>`).join('')}
      </div>`;
  }
  else if (step.type === 'slider') {
    card.innerHTML = `
      <div class="q-prompt">${step.prompt}</div>
      <div class="slider-wrap">
        <div class="slider-val" id="sliderVal">${step.min}${step.unit}</div>
        <input type="range" id="sliderInput" min="${step.min}" max="${step.max}" step="${step.step}" value="${step.min}">
        <button class="feedback-btn blue" onclick="answerSlider()" style="margin-top:16px;">Submit Answer</button>
      </div>`;
    document.getElementById('sliderInput').addEventListener('input', (e) => {
      document.getElementById('sliderVal').textContent = (step.unit === '$' ? '$' : '') + Number(e.target.value).toLocaleString() + (step.unit === '%' ? '%' : step.unit === 'x' ? 'x' : '');
    });
  }
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.4s ease-out';
}

function answerMC(idx) {
  const step = lessons[state.currentLesson].steps[state.currentStep];
  if (document.querySelector('.q-option.locked')) return;

  document.querySelectorAll('.q-option').forEach(o => o.classList.add('locked'));
  const correct = idx === step.correct;
  document.getElementById('opt' + idx).classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById('opt' + step.correct).classList.add('show-correct');
  handleAnswer(correct, step.explain);
}

function answerTF(val) {
  const step = lessons[state.currentLesson].steps[state.currentStep];
  if (document.querySelector('.tf-btn.locked')) return;

  document.querySelectorAll('.tf-btn').forEach(b => b.classList.add('locked'));
  const correct = val === step.correct;
  const clicked = val ? 'tfTrue' : 'tfFalse';
  const correctId = step.correct ? 'tfTrue' : 'tfFalse';
  document.getElementById(clicked).classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById(correctId).classList.add('show-correct');
  handleAnswer(correct, step.explain);
}

function answerFill(idx) {
  const step = lessons[state.currentLesson].steps[state.currentStep];
  if (document.querySelector('.fill-choice.locked')) return;

  document.querySelectorAll('.fill-choice').forEach(c => c.classList.add('locked'));
  const correct = idx === step.correct;
  document.getElementById('fc' + idx).classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById('fc' + step.correct).classList.add('correct');
  document.getElementById('fillBlank').textContent = step.choices[step.correct];
  document.getElementById('fillBlank').style.borderColor = correct ? 'var(--green)' : 'var(--red)';
  handleAnswer(correct, step.explain);
}

function answerSlider() {
  const step = lessons[state.currentLesson].steps[state.currentStep];
  const val = Number(document.getElementById('sliderInput').value);
  const correct = Math.abs(val - step.correct) <= step.tolerance;
  handleAnswer(correct, step.explain + (correct ? '' : ` The correct answer was ${step.unit === '$' ? '$' : ''}${step.correct}${step.unit === '%' ? '%' : step.unit === 'x' ? 'x' : ''}.`));
}

function handleAnswer(correct, explain) {
  state.lessonTotal++;
  if (correct) {
    state.lessonCorrect++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const bonus = state.streak >= 5 ? 5 : state.streak >= 3 ? 3 : 0;
    const xpGain = 10 + bonus;
    state.xp += xpGain;
    showFeedback('correct', `Correct! ${state.streak >= 3 ? '🔥 Streak bonus!' : ''}`, explain, 'Continue', `+${xpGain} XP`);
    showXpPopup(xpGain);
  } else {
    state.streak = 0;
    state.hearts--;
    showFeedback('wrong', 'Not quite!', explain, state.hearts > 0 ? 'Continue' : 'End Lesson');
    if (state.hearts <= 0) {
      document.getElementById('feedbackBtn').onclick = endLessonFail;
    }
  }
  updateStats();
}

function showFeedback(type, msg, explain, btnText, xpText) {
  const bar = document.getElementById('feedbackBar');
  bar.className = 'feedback-bar visible ' + type;
  document.getElementById('feedbackMsg').innerHTML = msg + (xpText ? ` <span class="xp-gain">${xpText}</span>` : '');
  document.getElementById('feedbackExplain').textContent = explain || '';
  const btn = document.getElementById('feedbackBtn');
  btn.textContent = btnText || 'Continue';
  btn.className = 'feedback-btn ' + (type === 'correct' ? 'green' : type === 'wrong' ? 'red' : 'next');
  if (type !== 'wrong' || state.hearts > 0) btn.onclick = nextStep;
}

function hideFeedback() {
  document.getElementById('feedbackBar').className = 'feedback-bar';
}

function nextStep() {
  state.currentStep++;
  const lesson = lessons[state.currentLesson];
  if (state.currentStep >= lesson.steps.length) {
    endLessonSuccess();
  } else {
    renderStep();
  }
}

function endLessonSuccess() {
  hideFeedback();
  if (!state.completed.includes(state.currentLesson)) {
    state.completed.push(state.currentLesson);
    state.xp += 25; // completion bonus
  }

  const acc = state.lessonTotal > 0 ? Math.round((state.lessonCorrect / state.lessonTotal) * 100) : 100;
  const perfect = acc === 100;

  if (perfect) spawnConfetti();

  showScreen('result');
  document.getElementById('resultCard').innerHTML = `
    ${perfect ? '<div class="result-perfect">⭐ PERFECT LESSON! ⭐</div>' : ''}
    <div class="result-emoji">${perfect ? '🏆' : acc >= 70 ? '🎉' : '💪'}</div>
    <div class="result-title">${perfect ? 'Flawless!' : acc >= 70 ? 'Lesson Complete!' : 'Keep Practicing!'}</div>
    <div class="result-subtitle">${lessons[state.currentLesson].id}: ${lessons[state.currentLesson].title}</div>
    <div class="result-stats">
      <div class="result-stat xp"><div class="val">${state.xp}</div><div class="label">Total XP</div></div>
      <div class="result-stat acc"><div class="val">${acc}%</div><div class="label">Accuracy</div></div>
      <div class="result-stat streak"><div class="val">${state.bestStreak}</div><div class="label">Best Streak</div></div>
    </div>
    <button class="result-btn" onclick="goHome()">Continue</button>
    <button class="result-btn secondary" onclick="startLesson(${state.currentLesson})">Redo Lesson</button>`;

  updateStats();
}

function endLessonFail() {
  hideFeedback();
  showScreen('result');
  document.getElementById('resultCard').innerHTML = `
    <div class="result-emoji">💔</div>
    <div class="result-title" style="color:var(--red)">Out of Hearts!</div>
    <div class="result-subtitle">Don't worry — review the concepts and try again.</div>
    <div class="result-stats">
      <div class="result-stat acc"><div class="val">${Math.round((state.lessonCorrect / state.lessonTotal) * 100)}%</div><div class="label">Accuracy</div></div>
    </div>
    <button class="result-btn" onclick="startLesson(${state.currentLesson})">Try Again</button>
    <button class="result-btn secondary" onclick="goHome()">Back to Map</button>`;
}

// ===================================================================
// EFFECTS
// ===================================================================
function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#58CC02', '#FFC800', '#FF4B4B', '#1CB0F6', '#CE82FF', '#FF9600'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 5) + 'px';
    piece.style.height = (Math.random() * 8 + 5) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.8) + 's';
    container.appendChild(piece);
  }
  setTimeout(() => container.innerHTML = '', 4000);
}

function showXpPopup(amount) {
  const popup = document.createElement('div');
  popup.className = 'xp-popup';
  popup.textContent = '+' + amount + ' XP';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1100);
}

// ===================================================================
// KEYBOARD SHORTCUTS
// ===================================================================
document.addEventListener('keydown', (e) => {
  if (state.screen === 'lesson') {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      const fb = document.getElementById('feedbackBar');
      if (fb.classList.contains('visible')) nextStep();
    }
    const step = lessons[state.currentLesson]?.steps[state.currentStep];
    if (step?.type === 'mc' && !document.querySelector('.q-option.locked')) {
      if (e.key === '1') answerMC(0);
      else if (e.key === '2') answerMC(1);
      else if (e.key === '3') answerMC(2);
      else if (e.key === '4') answerMC(3);
    }
  }
});

// ===================================================================
// INIT
// ===================================================================
updateStats();
showScreen('home');
</script>
</body>
</html>
